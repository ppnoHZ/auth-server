# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install uv
        uv sync

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # 只有在主分支 push 时才执行部署
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy and Start Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/oauth2-server
            
            # 1. 拉取最新代码
            git fetch --all
            git reset --hard origin/main
            
            # 2. 安装并使用 uv 同步依赖
            pip install uv
            uv sync
            
            # 使用 uv 的虚拟环境执行数据库迁移 (如果需要)
            # uv run alembic upgrade head

            # 3. 启动命令 (请根据您服务器的实际管理工具解除注释并修改)
            uv run uvicorn app.main:app --port 8000
            
            # 方案A: 使用 Supervisor 或 Systemd (推荐生产环境使用，确保 systemd 指向 .venv/bin/uvicorn)
            # sudo systemctl restart oauth2-server
            
            # 方案B: 使用 nohup 后台直接启动
            # pkill -f "uvicorn app.main:app" || true
            # nohup uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
            
            # 方案C: 使用 pm2
            # pm2 restart oauth2-server || pm2 start .venv/bin/uvicorn --name "oauth2-server" -- app.main:app --host 0.0.0.0 --port 8000
