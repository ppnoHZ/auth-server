<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OAuth2 Server{% endblock %}</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --success: #10b981;
            --input-focus: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: var(--bg); 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-main);
            padding: 1rem;
        }
        .card { 
            background: var(--card-bg); 
            padding: 1.5rem 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); 
            width: 100%; 
            max-width: 480px; /* Default width, override in specific pages if needed */
        }
        .header { text-align: center; margin-bottom: 1.5rem; }
        .header svg { width: 40px; height: 40px; color: var(--primary); margin-bottom: 0.75rem; background: #eff6ff; padding: 8px; border-radius: 50%; }
        h1 { font-size: 1.25rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.25rem; }
        
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.35rem; color: var(--text-main); font-size: 0.85rem; font-weight: 500; }
        input[type="text"], input[type="password"], input[type="email"], textarea { 
            width: 100%; 
            padding: 0.6rem 0.8rem; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            font-size: 0.9rem; 
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        button { 
            width: 100%; 
            padding: 0.75rem 1rem; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 0.95rem; 
            font-weight: 500; 
            cursor: pointer; 
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }
        button:hover { background: var(--primary-hover); }
        
        .error { 
            color: var(--danger); 
            background: #fef2f2;
            border: 1px solid #fecaca;
            padding: 0.6rem;
            border-radius: 6px;
            text-align: center; 
            margin-bottom: 1rem; 
            font-size: 0.85rem; 
        }
        .success { 
            color: var(--success); 
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            padding: 0.6rem;
            border-radius: 6px;
            text-align: center; 
            margin-bottom: 1rem; 
            font-size: 0.85rem; 
        }
        .link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .link a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
        
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
